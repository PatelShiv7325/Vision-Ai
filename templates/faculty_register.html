<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Registration - Vision AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4e54c8 0%, #7b4fa6 50%, #c471ed 100%);
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            animation: float 6s ease-in-out infinite;
        }
        body::before { width: 420px; height: 420px; background: #fff; top: -120px; left: -100px; }
        body::after  { width: 320px; height: 320px; background: #fff; bottom: -100px; right: -80px; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(20px); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .register-card {
            background: rgba(255,255,255,0.97);
            border-radius: 30px;
            padding: 2.8rem;
            max-width: 500px;
            width: 92%;
            box-shadow: 0 30px 80px rgba(20,20,80,0.25);
            animation: fadeUp 0.8s ease-in-out;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.12));
            color: #6f73ff;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 50px;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(111,115,255,0.25);
        }

        .register-card h2 {
            font-size: 1.85rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .divider {
            width: 50px;
            height: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0.8rem auto 1.8rem;
        }

        .alert-error {
            background: rgba(220,53,69,0.08);
            color: #dc3545;
            border: 1px solid rgba(220,53,69,0.2);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group label i {
            color: #667eea;
            margin-right: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 0.9rem;
        }

        .input-wrapper input {
            width: 100%;
            height: 50px;
            padding: 0 45px;
            border: 2px solid #e8eaf0;
            border-radius: 14px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            background: #f8f9fe;
            transition: all 0.3s ease;
            box-sizing: border-box;
            color: #333;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
            transform: translateY(-1px);
        }

        .input-wrapper input.valid   { border-color: #28a745; background: #f6fff8; }
        .input-wrapper input.invalid { border-color: #dc3545; background: #fff8f8; }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        .toggle-password:hover { color: #667eea; }

        .password-help {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
            padding-left: 4px;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(102,126,234,0.35);
            position: relative;
            overflow: hidden;
            margin-top: 0.6rem;
        }

        .btn-register::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: left 0.5s ease;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(102,126,234,0.45);
        }
        .btn-register:hover::after { left: 100%; }
        .btn-register:active { transform: translateY(-1px); }

        .links {
            margin-top: 1.5rem;
            font-size: 0.84rem;
            color: #999;
        }
        .links p { margin-bottom: 0.4rem; }
        .links a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        .links a:hover { color: #4a4fc4; }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 0.4rem;
            font-size: 0.82rem;
            color: #aaa;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-home:hover { color: #667eea; }

        @media (max-width: 520px) {
            .register-card { padding: 2rem 1.5rem; }
            .register-card h2 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>
    <div class="register-card">
        <div class="logo-icon">👨‍🏫</div>
        <div class="badge">Faculty Portal</div>

        <h2>Faculty Registration</h2>
        <p class="subtitle">Create your account to manage attendance</p>
        <div class="divider"></div>

        {% if error %}
        <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <!-- Full Name -->
            <div class="form-group">
                <label><i class="fas fa-user"></i>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user icon"></i>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>
            </div>

            <!-- Faculty ID -->
            <div class="form-group">
                <label><i class="fas fa-id-badge"></i>Faculty ID</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-badge icon"></i>
                    <input type="text" name="faculty_id" placeholder="Enter faculty ID" required>
                </div>
            </div>

            <!-- Department -->
            <div class="form-group">
                <label><i class="fas fa-building"></i>Department</label>
                <div class="input-wrapper">
                    <i class="fas fa-building icon"></i>
                    <input type="text" name="department" placeholder="Enter your department" required>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label><i class="fas fa-envelope"></i>Email ID</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope icon"></i>
                    <input type="email" name="email" placeholder="Enter your email address" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label><i class="fas fa-lock"></i>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show/hide password">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <small id="passwordHelp" class="password-help">
                    Min 8 chars with uppercase, lowercase, number & special character.
                </small>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus" style="margin-right: 8px;"></i>Register
            </button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/faculty-login">Login here</a></p>
            <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd     = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const show    = pwd.getAttribute('type') === 'password';
            pwd.setAttribute('type', show ? 'text' : 'password');
            eyeIcon.classList.toggle('fa-eye',      !show);
            eyeIcon.classList.toggle('fa-eye-slash', show);
        });

        document.getElementById('password').addEventListener('input', function () {
            const val   = this.value;
            const valid = val.length >= 8 &&
                          /[A-Z]/.test(val) &&
                          /[a-z]/.test(val) &&
                          /[0-9]/.test(val) &&
                          /[^A-Za-z0-9]/.test(val);

            this.classList.toggle('valid',   valid);
            this.classList.toggle('invalid', !valid);

            const help       = document.getElementById('passwordHelp');
            help.innerText   = valid ? '✅ Strong password!' : '❌ Weak — add uppercase, number & special char.';
            help.style.color = valid ? '#28a745' : '#dc3545';
        });
    </script>
</body>
</html>
