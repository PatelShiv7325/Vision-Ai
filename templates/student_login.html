<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Vision AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.15);
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 0.75rem;
        }

        .badge {
            background: #f0eeff;
            color: #667eea;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 20px;
        }

      h2 {
            font-size: 1.85rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }

        .alert-error {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #ffc9c9;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .form-group { margin-bottom: 1.2rem; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.4rem;
        }

        .input-wrapper { position: relative; }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 0.95rem;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid #e8e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            background: #fafafe;
            color: #333;
            transition: all 0.25s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .toggle-password:hover { color: #667eea; }

        .forgot-row {
            text-align: right;
            margin-top: 6px;
        }
        .forgot-row a {
            font-size: 0.78rem;
            font-weight: 600;
            color: #667eea;
            text-decoration: none;
        }
        .forgot-row a:hover { text-decoration: underline; }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(102,126,234,0.35);
        }
        .btn-primary:active { transform: translateY(0); }

        .links {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.83rem;
            color: #999;
            line-height: 1.9;
        }
        .links a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <div class="logo-icon">🎓</div>
            <span class="badge">Student Portal</span>
        </div>

        <h2>Student Login</h2>
        <p class="subtitle">Access your dashboard and attendance tools</p>
        <div class="divider"></div>

        {% if error %}
        <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:#667eea;margin-right:5px;"></i>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope icon"></i>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock" style="color:#667eea;margin-right:5px;"></i>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye toggle-password" id="togglePwd"></i>
                </div>
                <div class="forgot-row">
                    <a href="/forgot-password?role=student"><i class="fas fa-key" style="margin-right:3px;"></i>Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt" style="margin-right:7px;"></i>Login
            </button>
        </form>

        <div class="links">
            <p>Don't have an account? <a href="/student-register">Register here</a></p>
            <p><a href="/"><i class="fas fa-arrow-left" style="margin-right:4px;"></i>Back to Home</a></p>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
