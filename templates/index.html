<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AI - Face Recognition Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4e54c8 0%, #7b4fa6 50%, #c471ed 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background circles */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }
        body::before {
            width: 400px; height: 400px;
            background: #fff;
            top: -100px; left: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: #fff;
            bottom: -80px; right: -80px;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(20px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .home-wrapper {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 3.5rem 3.5rem;
            max-width: 820px;
            width: 92%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(20, 20, 80, 0.25);
            animation: fadeUp 0.8s ease-in-out;
            position: relative;
            z-index: 1;
        }

        /* Logo / Icon */
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            font-size: 2rem;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.12));
            color: #6f73ff;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 1rem;
            border: 1px solid rgba(111,115,255,0.25);
        }

        .home-wrapper h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.6rem;
            line-height: 1.2;
        }

        .home-wrapper p {
            color: #999;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            letter-spacing: 0.3px;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0 auto 2.5rem;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .btn-grid .btn {
            padding: 1.1rem 1rem;
            font-size: 0.97rem;
            font-weight: 700;
            width: 100%;
            border-radius: 16px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-student-reg {
            background: linear-gradient(135deg, #667eea, #8b5cf6);
            box-shadow: 0 8px 24px rgba(102,126,234,0.35);
        }

        .btn-student-log {
            background: linear-gradient(135deg, #5b4ee8, #764ba2);
            box-shadow: 0 8px 24px rgba(91,78,232,0.35);
        }

        .btn-faculty-reg {
            background: linear-gradient(135deg, #7c6ff7, #a855f7);
            box-shadow: 0 8px 24px rgba(124,111,247,0.35);
        }

        .btn-faculty-log {
            background: linear-gradient(135deg, #6654e8, #8b47d9);
            box-shadow: 0 8px 24px rgba(102,84,232,0.35);
        }

        .btn-grid .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(102,126,234,0.45);
            filter: brightness(1.08);
        }

        .btn-grid .btn:active {
            transform: translateY(-1px);
        }

        /* Shine effect */
        .btn-grid .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: left 0.5s ease;
        }

        .btn-grid .btn:hover::after {
            left: 100%;
        }

        .btn-icon { font-size: 1.1rem; }

        /* Footer note */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.78rem;
            color: #bbb;
            letter-spacing: 0.3px;
        }

        @media (max-width: 520px) {
            .home-wrapper { padding: 2.5rem 1.5rem; }
            .home-wrapper h1 { font-size: 2.1rem; }
            .btn-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="home-wrapper">
        <div class="logo-icon">👁️</div>
        <div class="badge">AI Powered</div>
        <h1>Welcome to Vision AI</h1>
        <p>Advanced Face Recognition Attendance System</p>
        <div class="divider"></div>
        <div class="btn-grid">
            <a href="/student-register" class="btn btn-student-reg">
                <span class="btn-icon">🎓</span> Student Register
            </a>
            <a href="/student-login" class="btn btn-student-log">
                <span class="btn-icon">🔐</span> Student Login
            </a>
            <a href="/faculty-register" class="btn btn-faculty-reg">
                <span class="btn-icon">👨‍🏫</span> Faculty Register
            </a>
            <a href="/faculty-login" class="btn btn-faculty-log">
                <span class="btn-icon">🔑</span> Faculty Login
            </a>
        </div>
        <p class="footer-note">Powered by Face Recognition Technology &nbsp;•&nbsp; Vision AI &copy; 2026</p>
    </div>
</body>
</html>
